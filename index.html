<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
      .container{
        height: 100vh;
        width: 100%;
        background-color: rgba(18, 14, 55, 0.811);
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card{
        height: 70vh;
        width: 300px;
        background-color: rgb(14, 12, 46);
        border-radius: 5px;
      }
      .btn{
        padding: 4px;
        border-radius: 50vh;
        width: 100px;
        font-size: medium;
        border: none;
        
      }
      .btn:hover{
        background-color: black;
        color: white;
        border: 1px solid rgb(144, 144, 28);
      }

      .score{
        width: 100%;
        height: 40%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: wheat;
        font-size: 60px;
      }
.buttons{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px;
    gap: 9px;
}

</style>
<body>
    <div class="container">
        <div class="card">
            <div class="score" id="countdown">
0
            </div>
            <div class="buttons">
            <button class="start-btn btn">Start</button>
            <button class="rest-btn btn">Rest</button>
            <button class="stop-btn btn">Stop</button>
            <button class="gettime btn">GetTime</button>
            <button class="clearTime btn">Clear Time</button>
            </div>
            <div class="restvalue"></div>
        </div>
    </div>

    <script>
      let countdownele= document.getElementById('countdown');
      let restvalueelmeent=document.querySelector('.restvalue');
      let startcount=0;
      let idinterval;
//   funtion create

// start time function
let startTimer=()=>{
idinterval=setInterval(()=>{countdownele.innerText=startcount++;},1000);

};

// stop function
let stoptime=()=>{
  clearInterval(idinterval);
};


// clear
let ClearTimevalue=()=>{
   clearInterval(idinterval);
countdownele.innerText=startcount='0';
};

// rest
let rest=()=>{

  startcount=0;
  countdownele.innerText=startcount;
     clearInterval(idinterval);
};

let showTime=()=>{
  
  let currentvalue=startcount;
  let newpara=document.createElement('p');
  newpara.innerText=`the stop time ${currentvalue}`;
   restvalueelmeent.append(newpara);
};












// start function
document.querySelector('.start-btn').addEventListener('click',startTimer);
// stop function
document.querySelector('.stop-btn').addEventListener('click',stoptime);

// rest function
document.querySelector('.rest-btn').addEventListener('click',rest);

// get time function
document.querySelector('.gettime').addEventListener('click',showTime);


// clear time
document.querySelector('.clearTime').addEventListener('click',ClearTimevalue);




// 
    </script>
</body>
</html>
